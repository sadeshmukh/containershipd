services:
  containershipd:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Mount the host Docker socket so containershipd can manage containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent storage for the SQLite DB and deployment workdirs.
      - containershipd_data:/var/lib/containershipd
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  containershipd_data:
